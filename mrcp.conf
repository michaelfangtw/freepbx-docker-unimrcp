;
; The configuration file of the app_unimrcp module.
;
; The configuration consists of general settings and MRCP profiles. One or more
; MRCP profiles can be specified. The default configuration file includes MRCP
; v2 and v1 profiles for:
;
; - UniMRCP Server (UMS)
; - Nuance Speech Server (NSS)
;
; Notes:
; - the default value of the parameter(s) server-ip must be replaced with the 
;   IP address of the corresponding MRCP server
; - the default value of the parameters client-ip and rtp-ip must be
;   replaced with the IP address of the MRCP client (Asterisk)
;

;
; General settings
;
[general]
; Default ASR and TTS profiles.
default-asr-profile = ums2
default-tts-profile = ums2
; UniMRCP logging level to appear in Asterisk logs.  Options are:
; EMERGENCY|ALERT|CRITICAL|ERROR|WARNING|NOTICE|INFO|DEBUG -->
log-level = DEBUG
max-connection-count = 100
max-shared-count = 100
offer-new-connection = 1
; rx-buffer-size = 1024
; tx-buffer-size = 1024
; request-timeout = 5000
speech-channel-timeout = 10000

completetimeout=10000    ;10s
incompletetimeout=5000 ;20s
maxspeechtimeout=10000  ;30s
interdigittimeout=1000; ;1s

[mrcpv2-properties]
Recognition-Timeout = 20000
No-Input-Timeout = 15000
Start-Input-Timers = 1


;
; Profile for UniMRCP Server [MRCPv2]
;
[ums2]
; MRCP settings
version = 2
;
; SIP settings
server-ip = 192.168.0.1; mrcp server1
server-port = 8060
; SIP user agent
client-ip = 192.168.0.3 ;client ip 
client-port = 8062 ;client port  8062,umsbackup: 8064 ,unimrcpclient.xml: 8063
sip-transport = udp
;
; RTP factory
rtp-ip = 192.168.0.3
rtp-port-min = 5000
rtp-port-max = 6000
;
; Jitter buffer settings
playout-delay = 50
max-playout-delay = 200
; RTP settings
ptime = 20
;codecs = PCMU PCMA L16/96/8000 telephone-event/101/8000
codecs = PCMU PCMA L16/96/8000 telephone-event/101/8000
; RTCP settings
rtcp = 0

[ums2backup]
; MRCP settings
version = 2
;
; SIP settings
server-ip = 192.168.0.2; server 2
server-port = 8060
; SIP user agent
client-ip = 192.168.0.3; client ip
client-port = 8064 ;client port backup 
sip-transport = udp
;
; RTP factory
rtp-ip = 192.168.0.3
rtp-port-min = 5000
rtp-port-max = 6000
;
; Jitter buffer settings
playout-delay = 50
max-playout-delay = 200
; RTP settings
ptime = 20
;codecs = PCMU PCMA L16/96/8000 telephone-event/101/8000
codecs = PCMU PCMA L16/96/8000 telephone-event/101/8000
; RTCP settings
rtcp = 0
